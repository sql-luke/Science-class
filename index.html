    <style>
        :root { --primary: #3498db; --secondary: #2c3e50; --bg: #f8f9fa; --danger: #e74c3c; --success: #27ae60; --light-blue: #ebf5fb; --speak-bg: #1abc9c; --lesson-bg: #fffde7; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; color: #333; line-height: 1.6; margin: 0; padding: 0; }

        .selectors { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }

        .chapter-title { color: var(--primary); font-size: 1.3em; margin-top: 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;}
        
        .infographic { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 2px solid #e2e8f0; text-align: center; }
        .info-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 15px; }
        .info-card { background: var(--light-blue); padding: 15px; border-radius: 8px; flex: 1 1 120px; border-bottom: 4px solid var(--primary); }
        .info-card .emoji { font-size: 2.5rem; display: block; margin-bottom: 5px; }
        .info-card .part { font-weight: bold; color: var(--primary); font-size: 1.2rem; }
        .info-card .eg { font-size: 0.9rem; color: #555; }
        
        .timeline { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .timeline-step { flex: 1; text-align: center; background: #ebf7f0; padding: 15px; border-radius: 50%; min-width: 80px; aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; border: 3px solid var(--success); }
        .timeline-arrow { color: #ccc; font-size: 1.5rem; }

        .lesson-content ul, .lesson-content ol { padding-left: 20px; margin-bottom: 0; }
        .lesson-content li { margin-bottom: 10px; }
        .keyword { font-weight: bold; color: #c0392b; background: #fadbd8; padding: 2px 5px; border-radius: 3px; }
        
        .life-app { background: #fdf2e9; padding: 20px; border-radius: 8px; border-left: 5px solid #e67e22; margin-top: 15px; }
        .life-app h3 { margin-top: 0; color: #d35400; display: inline-block; margin-bottom: 10px;}
        .think-box { background: #fff; padding: 15px; border-radius: 5px; border: 1px solid #fdebd0; color: #555; margin-bottom: 15px;}
        .hover-reveal { position: relative; background: #e9ecef; padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; border: 2px dashed #bdc3c7; overflow: hidden; }
        .hover-reveal .answer-text { opacity: 0; transition: opacity 0.3s; color: var(--success); font-weight: bold; font-size: 1.1em; }
        .hover-reveal::before { content: "👀 將滑鼠移過來 (或點擊) 看解答！"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #7f8c8d; font-weight: bold; transition: opacity 0.3s; pointer-events: none; width: 100%;}
        .hover-reveal:hover .answer-text, .hover-reveal:active .answer-text { opacity: 1; }
        .hover-reveal:hover::before, .hover-reveal:active::before { opacity: 0; }
        
        /* 測驗區 UI */

        .quiz-title-badge { background: #f39c12; color: white; padding: 8px 20px; border-radius: 30px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 6px rgba(243, 156, 18, 0.3);}
        .quiz-progress-badge { border: 2px solid #1abc9c; color: #16a085; background: #e8f8f5; padding: 8px 20px; border-radius: 30px; font-weight: bold; font-size: 1rem; }

        .question-card { background: #fff; padding: 25px; margin-bottom: 25px; border-radius: 15px; border: 1px solid #e2e8f0; border-left: 8px solid #4a90e2; box-shadow: 0 4px 10px rgba(0,0,0,0.03); position: relative; }
        .question-title { font-weight: bold; margin-bottom: 20px; font-size: 1.2em; display: flex; justify-content: flex-start; align-items: center; gap: 15px; color: #2c3e50;}
        .q-number { color: #4a90e2; font-size: 1.1em; }
        
        /* 2x2 網格選項設計 */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
        
        .options-grid label { display: flex; align-items: center; background: #f8f9fa; border: 2px solid #e2e8f0; border-radius: 10px; padding: 15px; cursor: pointer; transition: all 0.2s ease; font-weight: bold; color: #555;}
        .options-grid label:hover { border-color: #3498db; background: #ebf5fb; transform: translateY(-2px); box-shadow: 0 4px 6px rgba(52, 152, 219, 0.1);}
        .options-grid input[type="radio"] { margin-right: 15px; transform: scale(1.3); cursor: pointer; accent-color: #3498db;}
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center;}
        button { background: var(--primary); color: #fff; border: none; padding: 12px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        button:hover { filter: brightness(1.1); transform: scale(1.02); }
        .btn-danger { background: var(--danger); }
        .btn-info { background: #34495e; } 
        
        .btn-speak { background: #e8f8f5; border: 1px solid #1abc9c; color: #16a085; padding: 5px 15px; font-size: 14px; border-radius: 20px; flex-shrink: 0; text-align: center; box-shadow: none;}
        .btn-speak:hover { background: #1abc9c; color: white; transform: none;}
        .btn-speak.playing { background: #e67e22; color: white; border-color: #e67e22; animation: pulse 1.5s infinite; }
        
        .btn-success { background: var(--success); padding: 5px 12px; font-size: 14px; border-radius: 20px; border: none; color: white; cursor: pointer; transition: 0.3s; box-shadow: none;}
        .btn-success:hover { background: #1e8449; transform: scale(1.05); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(230, 126, 34, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(230, 126, 34, 0); } 100% { box-shadow: 0 0 0 0 rgba(230, 126, 34, 0); } }
        
        .feedback { margin-top: 15px; font-weight: bold; display: none; padding: 15px; border-radius: 8px; }
        .feedback.show { display: block; }
        .text-success { color: var(--success); background: #ebf7f0; border-left: 5px solid var(--success);}
        .text-danger { color: var(--danger); background: #fdedec; border-left: 5px solid var(--danger);}
        .explanation { font-size: 0.95em; color: #555; margin-top: 8px; font-weight: normal;}
        #score-display { font-size: 1.5em; font-weight: bold; text-align: center; color: var(--primary); margin: 30px 0; background: #ebf5fb; padding: 20px; border-radius: 10px;}
        
        #mistake-list .mistake-item { border-left: 5px solid var(--danger); padding: 20px; background: #fff; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
    </style>
</head>

<script>
    let synth = window.speechSynthesis;
    let voiceList = [];
    let currentUtterance = null;
    let currentBtn = null;
    
    function loadVoices() { voiceList = synth.getVoices(); }
    loadVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = loadVoices; }

    window.speakData = {};

    function toggleSpeak(key, btnElement) {
        if (!synth) { alert("瀏覽器不支援語音功能喔！"); return; }
        if (currentBtn === btnElement) {
            if (synth.speaking && !synth.paused) {
                synth.pause();
                btnElement.innerHTML = btnElement.getAttribute('data-orig').replace('🔊', '▶️ 繼續');
                btnElement.classList.remove('playing');
            } else if (synth.paused) {
                synth.resume();
                btnElement.innerHTML = btnElement.getAttribute('data-orig').replace('🔊', '⏸️ 暫停');
                btnElement.classList.add('playing');
            } else {
                playNewSpeech(key, btnElement);
            }
        } else {
            if (currentBtn) {
                currentBtn.innerHTML = currentBtn.getAttribute('data-orig');
                currentBtn.classList.remove('playing');
            }
            synth.cancel(); 
            playNewSpeech(key, btnElement);
        }
    }

    function playNewSpeech(key, btnElement) {
        const text = window.speakData[key];
        if(!text) return;
        currentBtn = btnElement;
        if(!btnElement.hasAttribute('data-orig')) { btnElement.setAttribute('data-orig', btnElement.innerHTML); }

        let utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'zh-TW';
        utterThis.pitch = 1.0; 
        utterThis.rate = 0.9; 
        
        let zhVoices = voiceList.filter(v => v.lang.includes('zh-TW') || v.lang.includes('zh-CN') || v.lang.includes('zh-HK'));
        let selectedVoice = zhVoices.find(v => v.name.includes('Hanhan') || v.name.includes('Xiaoxiao') || v.name.includes('Ting-Ting'));
        if (!selectedVoice && zhVoices.length > 1) selectedVoice = zhVoices[1];
        else if (!selectedVoice) selectedVoice = zhVoices[0];
        if (selectedVoice) utterThis.voice = selectedVoice;

        utterThis.onend = function() {
            if (currentBtn) {
                currentBtn.innerHTML = currentBtn.getAttribute('data-orig');
                currentBtn.classList.remove('playing');
                currentBtn = null;
            }
        };

        btnElement.innerHTML = btnElement.getAttribute('data-orig').replace('🔊', '⏸️ 暫停');
        btnElement.classList.add('playing');
        synth.speak(utterThis);
    }

    const knowledgeBase = {
        "grade3_term2": {
            // ==================== 第一單元 ====================
            "unit1": {
                "unitTitle": "單元1　田園樂",
                "sections": [
                    {
                        "chapterTitle": "【1-1】 蔬菜是從哪裡來的",
                        "infographicHTML": `
                            <br>
                            <div class="infographic">
                                <h4 style="margin:0; color:#2c3e50;">💡 學習圖解：餐桌上的植物拼圖</h4>
                                <div class="info-grid">
                                    <div class="info-card"><span class="emoji">🥕</span><span class="part">吃根部</span><br><span class="eg">胡蘿蔔、白蘿蔔</span></div>
                                    <div class="info-card"><span class="emoji">🥔</span><span class="part">吃莖部</span><br><span class="eg">馬鈴薯、芋頭</span></div>
                                    <div class="info-card"><span class="emoji">🥬</span><span class="part">吃葉子</span><br><span class="eg">高麗菜、小白菜</span></div>
                                    <div class="info-card"><span class="emoji">🥦</span><span class="part">吃花朵</span><br><span class="eg">花椰菜、金針花</span></div>
                                    <div class="info-card"><span class="emoji">🍅</span><span class="part">吃果實</span><br><span class="eg">番茄、小黃瓜</span></div>
                                </div>
                            </div>
                        `,
                        "lessonHTML": `
                            <h3>🚜 從農田到餐桌的奇妙旅程</h3>
                            <p>我們每天便當裡的蔬菜，可不是用魔法變出來的喔！它們是農夫伯伯在農田裡辛苦種植，收成後送到菜市場，最後才變成我們桌上的美味菜餚。</p>
                            <p>植物的身體就像積木一樣，我們吃的蔬菜其實是植物「不同的部位」：</p>
                            <ul>
                                <li>有些蔬菜把營養藏在土裡的<span class="keyword">「根」</span>或<span class="keyword">「莖」</span>。</li>
                                <li>有些蔬菜我們最愛吃它綠油油的<span class="keyword">「葉子」</span>。</li>
                                <li>還有些蔬菜是植物開花後結出來的<span class="keyword">「果實」</span>，裡面通常會包著種子喔！</li>
                            </ul>
                        `,
                        "applicationText": `
                            <h3>🤔 腦力激盪：小小思辨家</h3>
                            <div class="think-box">
                                <strong>情境：番茄到底算不算蔬菜？</strong><br>
                                有人說番茄甜甜的，裡面還有籽，應該是「水果」；但媽媽煮的番茄炒蛋，又把它當成「蔬菜」。<br>
                                <strong>👉 想一想：</strong>如果從「植物構造」來看，番茄是開花之後結出來的部位，它應該屬於哪一個部位呢？
                            </div>
                            <div class="hover-reveal">
                                <div class="answer-text">
                                    💡 解答：番茄是由花朵發育而來，且「裡面包著種子」，所以它絕對是植物的「果實」喔！只是因為習慣，我們常把它當蔬菜煮。
                                </div>
                            </div>
                        `
                    },
                    {
                        "chapterTitle": "【1-2】 哪些因素會影響蔬菜生長",
                        "infographicHTML": `
                            <div class="infographic">
                                <h4 style="margin:0; color:#2c3e50;">💡 學習圖解：植物生長三大法寶</h4>
                                <div class="info-grid">
                                    <div class="info-card" style="border-bottom-color: #f1c40f;"><span class="emoji">☀️</span><span class="part">充足陽光</span><br><span class="eg">幫助葉子製造食物</span></div>
                                    <div class="info-card" style="border-bottom-color: #3498db;"><span class="emoji">💧</span><span class="part">適量水分</span><br><span class="eg">保持土壤微濕不積水</span></div>
                                    <div class="info-card" style="border-bottom-color: #8e44ad;"><span class="emoji">🌱</span><span class="part">土壤養分</span><br><span class="eg">提供長大需要的肥料</span></div>
                                </div>
                            </div>
                        `,
                        "lessonHTML": `
                            <h3>☀️ 啟動植物成長的魔法</h3>
                            <p>想要成為厲害的小農夫，一定要知道植物寶寶長大最需要的「三大魔法寶物」：</p>
                            <ul>
                                <li>第一寶：<span class="keyword">陽光</span>。植物的葉子就像太陽能板，曬太陽就能自己製造食物。如果不讓它曬太陽，它會變得黃黃瘦瘦的喔！</li>
                                <li>第二寶：<span class="keyword">空氣和水</span>。植物口渴了要喝水，但盆子底下一定要有洞！如果水太多排不出去，植物的根會因為不能呼吸而爛掉。</li>
                                <li>第三寶：<span class="keyword">土壤與養分</span>。剛發芽時植物會吃「種子」自帶的便當；但長大後，就需要吸收土壤裡的肥料才會長得又高又壯。</li>
                            </ul>
                        `,
                        "applicationText": `
                            <h3>🤔 腦力激盪：小小思辨家</h3>
                            <div class="think-box">
                                <strong>情境：黑暗中的豆芽菜</strong><br>
                                我們說植物需要「陽光」才會綠油油的。可是豆芽菜長得白白胖胖的，而且是在「沒有陽光」的暗房裡種出來的喔！<br><br>
                                <strong>👉 想一想：</strong>為什麼豆芽菜不用曬太陽也能長大？它的養分從哪來？
                            </div>
                            <div class="hover-reveal">
                                <div class="answer-text">
                                    💡 解答：因為豆芽菜還在「發芽初期」！它靠著底部那一顆大大的「豆子」裡面自帶的養分就能長大。
                                </div>
                            </div>
                        `
                    },
                    {
                        "chapterTitle": "【1-3】 蔬菜生長會經歷哪些變化",
                        "infographicHTML": `
                            <br>

[Image of the life cycle of a plant from seed to flower and fruit]

                            <div class="infographic">
                                <h4 style="margin:0; color:#2c3e50;">💡 學習圖解：蔬菜的一生</h4>
                                <div class="timeline">
                                    <div class="timeline-step"><span class="emoji">🌰</span><span class="part">播種</span></div>
                                    <div class="timeline-arrow">➔</div>
                                    <div class="timeline-step"><span class="emoji">🌱</span><span class="part">發芽</span></div>
                                    <div class="timeline-arrow">➔</div>
                                    <div class="timeline-step"><span class="emoji">🌿</span><span class="part">長葉</span></div>
                                    <div class="timeline-arrow">➔</div>
                                    <div class="timeline-step"><span class="emoji">🌼</span><span class="part">開花結果</span></div>
                                </div>
                            </div>
                        `,
                        "lessonHTML": `
                            <h3>🌱 蔬菜的成長日記</h3>
                            <p>種菜就像照顧小寶寶一樣，我們會看到它經歷一連串神奇的變化：</p>
                            <ol>
                                <li><span class="keyword">播種</span>：先把土翻鬆，把小小的種子埋進鬆軟的土裡。</li>
                                <li><span class="keyword">發芽</span>：種子喝飽水後，會先長出往下鑽的「根」，再長出往上頂的「莖和子葉」。</li>
                                <li><span class="keyword">長葉與疏苗</span>：如果同一個盆子裡苗長得太擠，我們要拔掉一些比較弱小的苗，這叫做<span class="keyword">「疏苗」</span>，讓剩下的植物有更多空間長大。</li>
                                <li><span class="keyword">開花與結果</span>：植物長大成熟後會開出美麗的花，花謝了之後就會結出果實和新的種子！</li>
                            </ol>
                        `,
                        "applicationText": `
                            <h3>🤔 腦力激盪：小小思辨家</h3>
                            <div class="think-box">

                        "lessonHTML": `
                            <h3>🪄 改變物品形狀的變身術</h3>
                            <p>在我們身邊的物品（科學家稱為「物質」），有時候會改變它們的長相。有三種魔法力量可以讓它們變身：</p>
                            <ul>
                                <li><span class="keyword">溫度的改變</span>：這是最常見的魔法！東西變熱（受熱）或變冷（遇冷），狀態就會改變。例如：冰淇淋離開冰箱後，因為吸收空氣中的熱量，就會漸漸融化。</li>
                                <li><span class="keyword">施加外力</span>：用力捏、壓、拉，可以改變物體的形狀，就像我們用手把平整的色紙揉成一團。</li>
                                <li><span class="keyword">溶解於水</span>：有些東西放進水裡攪拌後會「隱形」，這叫做<span class="keyword">溶解</span>，例如把方糖泡進熱紅茶裡。</li>
                            </ul>
                        `,
                        "applicationText": `
                            <h3>🤔 腦力激盪：小小思辨家</h3>

                                <strong>情境：口袋裡的巧克力</strong><br>
                                小明把一塊硬梆梆的巧克力放進褲子口袋裡，開心地跑去操場玩。過了半小時，他想把巧克力拿出來吃，卻發現口袋變得黏呼呼的！<br><br>
                                <strong>👉 想一想：</strong>小明明明沒有帶打火機或吹風機，為什麼口袋裡的巧克力會「融化」呢？熱量是從哪裡來的？
                            </div>
                            <div class="hover-reveal">
                                <div class="answer-text">
                                    💡 解答：熱量是從「小明的身體」傳出來的！人體的溫度大約是 36 度，比硬梆梆巧克力的融點還要高。巧克力吸收了身體的體溫（受熱），就融化變成液體了。
                                </div>
                            </div>
                        `

                        "lessonHTML": `
                            <h3>💧 百變水精靈：水的三種型態</h3>
                            <p>水是地球上最神奇的物質，它會因為溫度的不同，出現三種完全不同的長相（三態）：</p>
                            <ul>
                                <li><span class="keyword">固態（冰）</span>：當溫度非常冷，降到 <strong>0°C（冰點）</strong>時，液態水就會結冰，變得硬梆梆的，這叫做<span class="keyword">凝固</span>。</li>
                                <li><span class="keyword">液態（水）</span>：平常我們洗手喝的水。如果把冰塊拿出來放著，它受熱變成液態水，這叫做<span class="keyword">融化</span>。</li>
                                <li><span class="keyword">氣態（水蒸氣）</span>：當水被加熱到 <strong>100°C（沸點）</strong>，水會一直冒泡泡並變成看不見的氣體跑到空氣中，這叫做<span class="keyword">沸騰</span>或<span class="keyword">蒸發</span>。</li>
                            </ul>
                        `,

                                </div>
                            </div>
                        `

                            <h3>🍳 回不去的神奇化學變化</h3>

                            <ul>
                                <li><span class="keyword">不可逆變化</span>：很多食物受熱後，性質會完全改變，而且再也無法恢復原狀！例如：透明的生蛋白煎熟後變成白色的固體、玉米加熱爆成爆米花。就算把它們放回冰箱，也變不回生蛋和玉米粒了。</li>
                                <li><span class="keyword">熱脹冷縮現象</span>：很多物體（尤其是金屬和氣體）在受熱時體積會稍微「膨脹變大」，遇冷時會「收縮變小」。</li>

                    { id: 241, q: "將一杯 50°C 的溫水放進冰箱冷凍庫，它的溫度會如何變化？", options: ["持續上升", "先上升再下降", "持續下降直到結冰", "維持不變"], ans: 2, exp: "冷凍庫溫度很低，溫水會不斷散失熱量，溫度下降直到 0°C 結冰。" },
                    { id: 242, q: "下列哪一個例子「不是」不可逆變化？", options: ["生米煮成熟飯", "冰塊融化成水", "紙張燒成灰燼", "生雞蛋煮成水煮蛋"], ans: 1, exp: "冰塊融化成水後，放回冷凍庫又能變回冰塊，所以是可逆變化。" },
                    { id: 243, q: "如果在熱水和冷水裡同時加入一樣多的食鹽，哪一杯的食鹽會先完全溶解？", options: ["冷水", "熱水", "一樣快", "都不會溶解"], ans: 1, exp: "溫度越高，物質溶解的速度通常越快。" },
                    { id: 244, q: "冬天戴眼鏡吃熱湯麵時，鏡片常會起霧，這層霧其實是什麼？", options: ["湯裡的油", "熱氣造成的幻覺", "水蒸氣遇冷凝結的小水滴", "鏡片融化了"], ans: 2, exp: "熱湯產生的水蒸氣遇到溫度較低的鏡片，凝結成無數微小的液態水滴附著在上面。" },
                    { id: 245, q: "把紙張撕碎和把紙張燒掉，這兩種變化有什麼不同？", options: ["撕碎是不可逆，燒掉是可逆", "兩者都是改變形狀", "撕碎只是外力改變形狀，燒掉是不可逆的化學變化", "沒有不同"], ans: 2, exp: "撕碎的紙本質還是紙；但燒掉的紙變成了碳灰，本質已經改變且無法復原。" },
                    { id: 246, q: "橋樑的接縫處通常會留有一點空隙，這是為了預防什麼情況發生？", options: ["讓雨水流下去", "防止夏天熱脹造成橋樑擠壓變形", "節省建築材料", "為了比較美觀"], ans: 1, exp: "與鐵軌原理相同，都是為了預留金屬或水泥夏天受熱膨脹的空間。" },
                    { id: 247, q: "下列哪一種物質受熱後的變化，和巧克力受熱融化最相似？", options: ["玉米粒變爆米花", "生肉煮熟", "奶油在烤盤上化開", "木材燃燒"], ans: 2, exp: "奶油受熱化開是物理狀態的改變（融化），冷卻後能恢復固體，與巧克力相同。" },
                    { id: 248, q: "我們常吃的「果凍」，在製作過程中將果凍粉加入熱水攪拌至看不見，這是什麼過程？", options: ["蒸發", "溶解", "凝固", "沸騰"], ans: 1, exp: "粉末均勻混入水中看不見，就是溶解過程。" },
                    { id: 249, q: "水壺裡的水燒開時，壺嘴噴出的「白煙」周圍，其實還有一小段完全透明的區域，那是什麼？", options: ["真正的水蒸氣", "空氣", "魔法空間", "火的煙"], ans: 0, exp: "緊貼壺嘴透明看不見的才是真正氣態的『水蒸氣』；遠一點看到的白煙已經是凝結的小水滴了。" },
                    { id: 250, q: "如果想要改變一塊木頭的形狀，最適合使用下列哪一種方法？", options: ["泡在水裡溶解它", "放進冰箱冷凍", "用鋸子鋸開(施加外力)", "放在太陽下曬"], ans: 2, exp: "木頭不溶於水也不易因一般溫度改變形狀，必須使用工具施加外力來切割。" }                    
                ]

            "unit3": {

                        "chapterTitle": "【3-1】 動物身體構造和功能有關嗎",
                        "infographicHTML": `
                            <div class="infographic">
                                <h4 style="margin:0; color:#2c3e50;">💡 學習圖解：動物的超級裝備</h4>
                                <div class="info-grid">
                                    <div class="info-card" style="border-bottom-color: #3498db;"><span class="emoji">🦅</span><span class="part">翅膀</span><br><span class="eg">提供升力在空中飛翔</span></div>
                                    <div class="info-card" style="border-bottom-color: #2ecc71;"><span class="emoji">🐸</span><span class="part">腳蹼</span><br><span class="eg">像蛙鞋一樣幫助游泳</span></div>
                                    <div class="info-card" style="border-bottom-color: #e67e22;"><span class="emoji">🦘</span><span class="part">強壯後腿</span><br><span class="eg">用來快速跳躍逃跑</span></div>
                                </div>
                            </div>
                        `,
                        "lessonHTML": `
                            <h3>🦅 動物的神奇身體工具箱</h3>
                            <p>動物為了生存，牠們的身體構造就像「特製工具」一樣，每一部分都有非常神聖的任務：</p>
                            <ul>
                                <li><span class="keyword">飛翔的翅膀與羽毛</span>：鳥類有非常輕巧的骨骼和強壯的翅膀，讓牠們能對抗地心引力飛上天空找食物。</li>
                                <li><span class="keyword">游泳的鰭與流線型</span>：魚類有流線型的身體來減少水阻，並用「鰭」來控制方向和前進。</li>
                                <li><span class="keyword">跳躍的腿與水中的蹼</span>：青蛙的後腿非常強壯，能跳得很高；腳趾之間還有一層薄薄的「蹼」，就像天生的蛙鞋，讓牠們在水裡游得超快。</li>
                            </ul>
                        `,
                        "applicationText": `
                            <h3>🤔 腦力激盪：小小思辨家</h3>
                            <div class="think-box">
                                <strong>情境：如果企鵝來到平地賽跑...</strong><br>
                                企鵝雖然是鳥類，但牠們不會飛，走起路來還搖搖晃晃的，看起來很笨重。<br><br>
                                <strong>👉 想一想：</strong>企鵝的翅膀雖然不能飛，但在「哪裡」卻能發揮出像超級跑車一樣的功能呢？
                            </div>
                            <div class="hover-reveal">
                                <div class="answer-text">
                                    💡 解答：在海裡！企鵝的翅膀演化成了像「槳」一樣的鰭狀肢，讓牠們能在水裡高速游泳、抓魚，是海洋中的超級游泳高手！
                                </div>
                            </div>
                        `
                    },
                    {
                        "chapterTitle": "【3-2】 動物身體構造和適應環境有關嗎",
                        "infographicHTML": `
                            <br>
                            <div class="infographic">
                                <h4 style="margin:0; color:#2c3e50;">💡 學習圖解：適應環境的魔法</h4>
                                <div class="info-grid">
                                    <div class="info-card" style="border-bottom-color: #bdc3c7;"><span class="emoji">🐻‍❄️</span><span class="part">極地保暖</span><br><span class="eg">厚厚脂肪與濃密毛髮</span></div>
                                    <div class="info-card" style="border-bottom-color: #f39c12;"><span class="emoji">🐪</span><span class="part">沙漠儲存</span><br><span class="eg">駝峰儲存脂肪提供能量</span></div>
                                    <div class="info-card" style="border-bottom-color: #27ae60;"><span class="emoji">🦎</span><span class="part">保護色</span><br><span class="eg">身體顏色跟環境融為一體</span></div>
                                </div>
                            </div>
                        `,
                        "lessonHTML": `
                            <h3>🌍 動物的極限環境求生術</h3>
                            <p>地球上有很冷、很熱、很乾燥的地方，動物的身體會根據牠們住的地方「改變設計」：</p>
                            <ul>
                                <li><span class="keyword">極地動物（如北極熊）</span>：擁有厚厚的皮下脂肪和密集的毛髮，就像穿了超級羽絨衣，可以在冰天雪地裡保暖。</li>
                                <li><span class="keyword">沙漠動物（如駱駝）</span>：駱駝背上的「駝峰」其實不是裝水，而是裝滿了「脂肪」！當沙漠裡找不到食物時，駝峰裡的脂肪可以轉換成救命的能量和水分。</li>
                                <li><span class="keyword">森林與草地動物</span>：許多動物擁有<span class="keyword">保護色或擬態</span>（如竹節蟲、變色龍），讓身體顏色跟樹枝或葉子長得一模一樣，躲避敵人的追捕。</li>
                            </ul>
                        `,
                        "applicationText": `
                            <h3>🤔 腦力激盪：小小思辨家</h3>
                            <div class="think-box">
                                <strong>情境：北極熊的皮膚其實是...黑色的？</strong><br>
                                我們看到的北極熊都是一身白毛，完美隱藏在雪地裡。但如果你撥開牠的白毛，會發現牠的皮膚竟然是「黑色」的！<br><br>
                                <strong>👉 想一想：</strong>在這麼冷的地方，為什麼北極熊需要「黑色」的皮膚呢？（提示：夏天穿黑衣服會覺得比較熱！）
                            </div>
                            <div class="hover-reveal">
                                <div class="answer-text">
                                    💡 解答：黑色的皮膚可以幫助北極熊「吸收太陽的熱量」！陽光穿過透明中空的白毛後，黑色皮膚能最有效率地把熱量吸收到身體裡保暖。
                                </div>
                            </div>
                        `
                    },
                    {
                        "chapterTitle": "【3-3】 動物有什麼生存法寶",
                        "infographicHTML": `
                            <div class="infographic">
                                <h4 style="margin:0; color:#2c3e50;">💡 學習圖解：動物的防禦大招</h4>
                                <div class="timeline">
                                    <div class="timeline-step" style="border-color:#34495e;"><span class="emoji">🐢</span><span class="part">裝甲防禦</span><br><span style="font-size:0.8em">縮進堅硬外殼</span></div>
                                    <div class="timeline-step" style="border-color:#e67e22;"><span class="emoji">🦔</span><span class="part">尖刺武器</span><br><span style="font-size:0.8em">豎起刺讓敵人受傷</span></div>
                                    <div class="timeline-step" style="border-color:#9b59b6;"><span class="emoji">🦨</span><span class="part">化學攻擊</span><br><span style="font-size:0.8em">噴出惡臭或毒液</span></div>
                                    <div class="timeline-step" style="border-color:#7f8c8d;"><span class="emoji">😵</span><span class="part">裝死欺騙</span><br><span style="font-size:0.8em">假裝死掉讓敵人沒興趣</span></div>
                                </div>
                            </div>
                        `,
                        "lessonHTML": `
                            <h3>🛡️ 不好惹！動物的終極防禦武器</h3>
                            <p>大自然中充滿危險，弱小的動物為了不被吃掉，演化出了各種超強的「生存法寶」：</p>
                            <ul>
                                <li><span class="keyword">硬殼裝甲</span>：烏龜、蝸牛遇到危險時，會把柔軟的身體縮進堅硬的殼裡保護自己。</li>
                                <li><span class="keyword">尖刺攻擊</span>：豪豬和刺蝟的背上長滿了尖刺，老虎獅子看了也不敢咬。</li>
                                <li><span class="keyword">惡臭與警告色</span>：臭鼬會噴出超臭的氣體把敵人熏跑；毒蛇和箭毒蛙則是用非常鮮豔的顏色警告別人「我有毒，別吃我」。</li>
                                <li><span class="keyword">欺敵裝死戰術</span>：有些昆蟲或負鼠遇到危險時，會翻肚「裝死」，讓只喜歡吃活餌的敵人失去興趣。</li>
                            </ul>
                        `,
                        "applicationText": `
                            <h3>🤔 腦力激盪：小小思辨家</h3>
                            <div class="think-box">
                                <strong>情境：氣噗噗的河豚</strong><br>
                                海裡的河豚平時看起來小小的，但是遇到大魚想吃牠時，牠會猛喝水，把自己的身體脹成一顆充滿刺的「大圓球」。<br><br>
                                <strong>👉 想一想：</strong>為什麼把自己變大、變圓，就可以防止被大魚吃掉呢？
                            </div>
                            <div class="hover-reveal">
                                <div class="answer-text">
                                    💡 解答：把身體脹大可以嚇唬敵人，而且脹成一顆充滿刺的大氣球後，大魚的「嘴巴根本張不了那麼大」，也就無法把河豚吞下肚子了！
                                </div>
                            </div>
                        `
                    }
                ],
                "questions": [
                    { id: 301, q: "鳥類能飛翔在天空中，主要是因為牠們具有哪一種構造？", options: ["蹼", "鰓", "翅膀和羽毛", "堅硬的外殼"], ans: 2, exp: "鳥類的翅膀和羽毛能提供升力。" },
                    { id: 302, q: "青蛙的腳趾之間有「蹼」，這個構造主要的功能是什麼？", options: ["方便跳躍", "幫助在水中游泳", "抓住獵物", "保暖"], ans: 1, exp: "蹼能增加推水面積，幫助游泳。" },
                    { id: 303, q: "下列哪一種動物的身體構造，是呈現流線型，最適合在水中活動？", options: ["兔子", "老鷹", "海豚", "長頸鹿"], ans: 2, exp: "海豚具有流線型身體，能減少水中阻力。" },
                    { id: 304, q: "駱駝被稱為「沙漠之舟」，牠背上的駝峰主要儲存了什麼？", options: ["水分", "血液", "空氣", "脂肪"], ans: 3, exp: "駝峰裡儲存的是脂肪，可分解成能量和水分。" },
                    { id: 305, q: "竹節蟲長得像樹枝，這種生存法寶稱為什麼？", options: ["裝死", "保護色/擬態", "硬殼", "毒液"], ans: 1, exp: "長得像周圍環境隱藏自己，稱為保護色或擬態。" },
                    { id: 306, q: "當烏龜遇到危險時，牠會採取哪一種防禦方法？", options: ["噴出毒液", "用後腿踢", "縮進硬殼中", "變色隱藏"], ans: 2, exp: "烏龜的硬殼是牠們最堅固的防禦裝甲。" },
                    { id: 307, q: "臭鼬遇到敵人威脅時，會使用什麼特殊的生存法寶？", options: ["豎起尖刺", "放出惡臭氣體", "裝死", "快速飛走"], ans: 1, exp: "會噴出極度惡臭的液體讓敵人逃跑。" },
                    { id: 308, q: "為什麼有些青蛙身體顏色非常鮮豔亮麗？", options: ["為了吸引人類", "代表我有毒的警告色", "為了反射陽光", "喜歡漂亮"], ans: 1, exp: "鮮豔顏色通常是警告色，表示有毒。" },
                    { id: 309, q: "魚類能在水中呼吸，是因為牠們具有哪一種構造？", options: ["肺臟", "皮膚", "鰓", "氣孔"], ans: 2, exp: "魚類利用鰓過濾水中的氧氣。" },
                    { id: 310, q: "河豚遇到危險會把身體脹大，這有什麼防禦效果？", options: ["游得更快", "讓敵人難以吞咽", "發出大聲音", "放出毒氣"], ans: 1, exp: "脹大且充滿刺的身體會讓掠食者的嘴巴無法吞下。" }
                    { id: 311, q: "大象長長、靈活的鼻子，主要是用來做什麼的？", options: ["只有呼吸的功能", "用來像手一樣抓取食物和吸水", "用來聽聲音", "用來看東西"], ans: 1, exp: "大象的鼻子由肌肉組成，非常靈活，能像人類的手一樣捲取樹葉和吸水送入口中。" },
                    { id: 312, q: "獵豹是陸地上跑得最快的動物，牠主要依靠身體的哪一個部位來高速奔跑？", options: ["長長的尾巴", "強壯細長的四肢(腿)", "大大的耳朵", "尖銳的牙齒"], ans: 1, exp: "獵豹擁有流線型的身體和強健、富彈性的四肢，讓牠具備極高的瞬間爆發力。" },
                    { id: 313, q: "蝙蝠可以在天空中飛行，牠們的「翅膀」其實是什麼構造？", options: ["長滿羽毛的手", "手指骨頭之間連接的薄膜(皮膜)", "兩片大葉子", "硬梆梆的骨板"], ans: 1, exp: "蝙蝠是哺乳類不是鳥類，牠們的翅膀是由前肢延伸出來的皮膜所構成。" },
                    { id: 314, q: "家裡的貓咪在黑暗中也能靈活行動，除了視力好，牠臉上的什麼構造也幫助牠感知周圍環境？", options: ["長長的鬍鬚", "濕濕的鼻子", "尖尖的牙齒", "圓圓的額頭"], ans: 0, exp: "貓的鬍鬚根部有豐富的神經，能敏銳地感覺氣流變化和空間寬度，就像雷達一樣。" },
                    { id: 315, q: "袋鼠媽媽肚子上的「育兒袋」，最主要的功能是什麼？", options: ["裝自己要吃的食物", "保護和哺育剛出生脆弱的袋鼠寶寶", "用來裝水", "用來保暖自己"], ans: 1, exp: "袋鼠寶寶出生時發育還很不完全，需要在媽媽的育兒袋裡吸奶並繼續長大。" },
                    { id: 316, q: "沒有腳的蚯蚓，是如何在泥土裡移動的？", options: ["用翅膀飛", "用身體肌肉一伸縮一伸長來爬行", "在土裡滾動", "用嘴巴咬住土往前拉"], ans: 1, exp: "蚯蚓靠著身體肌肉的收縮與舒張，配合體表的剛毛抓住泥土來前進。" },
                    { id: 317, q: "老鷹等猛禽有著非常尖銳且向下彎曲的鳥喙(嘴巴)，這種構造適合用來做什麼？", options: ["吸花蜜", "啄開堅硬的堅果", "撕裂獵物的肉", "在泥土裡挖蟲子"], ans: 2, exp: "彎曲且鋒利的鳥喙就像鉤子一樣，非常適合肉食性鳥類撕咬獵物。" },
                    { id: 318, q: "住在沙漠裡的「耳廓狐(沙漠狐狸)」，為什麼有一對超級大的耳朵？", options: ["為了讓自己變好看", "可以像翅膀一樣拍打", "幫助身體散熱並敏銳聽見獵物聲音", "用來擋住沙子"], ans: 2, exp: "大耳朵充滿微血管，能幫助牠們在炎熱的沙漠中快速散失體熱，同時具備極佳聽力。" },
                    { id: 319, q: "有些變色龍或章魚可以隨著環境改變自己身體的顏色，這有什麼好處？", options: ["隱藏自己，躲避敵人或方便偷襲獵物", "讓自己更容易被同伴吃掉", "因為牠們覺得無聊", "為了反射月光"], ans: 0, exp: "改變體色與背景融為一體（保護色），是自然界中極佳的攻防隱身術。" },
                    { id: 320, q: "長頸鹿除了長長的脖子，牠還有超長且靈活的「舌頭」，這有什麼功用？", options: ["用來唱歌", "可以捲住樹枝，避開刺吃高處的樹葉", "用來打架", "用來喝地下的水"], ans: 1, exp: "長頸鹿的舌頭可達 40 公分以上，能靈活地繞過樹刺，把葉子捲進嘴裡。" },
                    { id: 321, q: "豪豬(箭豬)遇到危險時，會使用什麼方法來保護自己？", options: ["噴出毒液", "豎起背上銳利的長刺倒退撞敵人", "把頭縮進土裡", "變成透明的"], ans: 1, exp: "豪豬的刺非常銳利且容易脫落，當敵人被刺中時會非常痛苦，是很強的防禦武器。" },
                    { id: 322, q: "有些蜥蜴在被天敵咬住尾巴時，會發生什麼神奇的求生現象？", options: ["尾巴會發出閃電", "會自行斷掉尾巴(斷尾求生)讓自己逃跑", "尾巴會變成長劍", "尾巴會變出毒氣"], ans: 1, exp: "蜥蜴會切斷自己的尾巴，斷掉的尾巴還會跳動吸引敵人注意，藉機逃脫，之後尾巴會再長出來。" },
                    { id: 323, q: "烏賊或章魚在海底遇到危險時，除了變色，還會使出什麼大招來逃跑？", options: ["噴出黑色的墨汁混淆敵人視線", "發出超音波", "裝死浮在水面", "變成一顆大石頭"], ans: 0, exp: "噴出墨汁就像丟出煙霧彈一樣，能瞬間遮蔽掠食者的視線幫助牠們脫身。" },
                    { id: 324, q: "為什麼北極熊的腳掌底部長有密密麻麻的毛？", options: ["為了好看", "可以在冰雪上防滑並且保暖", "用來儲存食物", "方便在水裡游泳"], ans: 1, exp: "腳底的毛就像穿了防滑雪靴，既能增加在冰上的摩擦力，也能防止腳掌凍傷。" },
                    { id: 325, q: "蝴蝶等昆蟲用來吸食花蜜的嘴巴(口器)，長得像什麼形狀？", options: ["尖銳的鉤子", "平平的鏟子", "像一根長長可捲曲的吸管", "大大的剪刀"], ans: 2, exp: "蝴蝶的虹吸式口器平常捲起來，吸花蜜時會伸長像吸管一樣深入花朵中。" },
                    { id: 326, q: "鴕鳥是世界上體型最大的鳥類，雖然不會飛，但遇到危險時牠會怎麼做？", options: ["躲進樹洞裡", "用強壯的長腿快速奔跑逃離", "在水裡潛水", "噴出臭氣"], ans: 1, exp: "鴕鳥擁有極為強壯的雙腿，奔跑速度非常快，是牠們躲避掠食者的主要方法。" },
                    { id: 327, q: "枯葉蝶的身體長得就像一片乾枯的葉子，這種生存法寶稱為什麼？", options: ["擬態", "裝死", "發光", "毒性"], ans: 0, exp: "外表演化得像周圍環境中特定的物品（如枯葉、樹枝）來隱藏自己，稱為擬態。" },
                    { id: 328, q: "毒蛇(如眼鏡蛇)主要依靠什麼構造來攻擊獵物或防禦敵人？", options: ["強壯的尾巴", "尖銳且能分泌毒液的毒牙", "大聲的吼叫", "堅硬的鱗片"], ans: 1, exp: "毒蛇的毒牙就像注射器，能將毒液注入獵物體內使其麻痺或死亡。" },
                    { id: 329, q: "「彈塗魚」是一種神奇的魚，牠們為什麼可以在泥灘上爬行甚至跳躍？", options: ["牠們其實是青蛙", "演化出強壯發達的胸鰭當作手臂來支撐", "牠們有裝馬達", "牠們的鱗片有黏性"], ans: 1, exp: "彈塗魚發達的胸鰭就像小手臂一樣，能撐起身體在泥灘上移動找食物。" },
                    { id: 330, q: "駱駝在風沙很大的沙漠中，有什麼特殊的構造可以保護眼睛不被沙子吹進去？", options: ["戴著護目鏡", "有超長且濃密的睫毛", "眼睛長在頭頂", "會分泌特殊的膠水"], ans: 1, exp: "駱駝擁有雙層且濃長的睫毛，就像天然的防沙網，能阻擋風沙進入眼睛。" },
                    { id: 331, q: "蜜蜂遇到威脅時，會使用什麼武器來保護蜂巢？", options: ["尾部的毒針", "巨大的翅膀", "堅硬的下巴", "吐出蜂蜜黏住敵人"], ans: 0, exp: "工蜂會用尾部的毒針螫刺入侵者，但螫人後多數工蜂自己也會死亡。" },
                    { id: 332, q: "動物的「保護色」主要是為了達到什麼目的？", options: ["吸引人類來拍照", "讓身體和環境顏色相近，不被輕易發現", "為了在夜間發光", "讓自己感覺比較溫暖"], ans: 1, exp: "保護色能讓動物融入背景，降低被掠食者發現的機率，或是方便捕食者埋伏。" },
                    { id: 333, q: "青蛙在捕捉飛蟲時，最依賴哪一個身體構造？", options: ["前腿", "長長且帶有黏性的舌頭", "翅膀", "尾巴"], ans: 1, exp: "青蛙的舌頭根部在嘴巴前端，翻出時速度極快且有黏液，能精準黏住飛過的小蟲。" },
                    { id: 334, q: "許多鳥類(如綠頭鴨)的羽毛上會有一層油脂，這有什麼功用？", options: ["讓自己聞起來比較香", "防水，讓羽毛不會吸滿水而沉下去", "為了防止羽毛掉落", "可以用來生火"], ans: 1, exp: "尾脂腺分泌的油脂塗在羽毛上能達到防水效果，讓水禽能浮在水面上不會濕透。" },
                    { id: 335, q: "穿山甲的全身覆蓋著什麼特殊的構造來防禦敵人？", options: ["長長的毛髮", "堅硬的角質鱗片", "柔軟的黏液", "有毒的刺"], ans: 1, exp: "穿山甲遇到危險會捲成球，全身堅硬的鱗片就像鎧甲，連獅子老虎都咬不破。" },
                    { id: 336, q: "斑馬身上的黑白條紋，在草原上成群結隊時有什麼作用？", options: ["讓獅子覺得眼花撩亂，無法鎖定一隻來抓", "用來吸收陽光", "為了互相認識", "代表牠們有毒"], ans: 0, exp: "當斑馬群奔跑時，條紋交錯會產生視覺錯覺（擾亂色），讓掠食者難以判斷單一個體的位置。" },
                    { id: 337, q: "企鵝生活在極度寒冷的南極，除了厚脂肪，牠們還會用什麼行為來保暖？", options: ["生火取暖", "大家緊緊擠在一起(互相依偎)", "躲在熱水裡", "一直跑步不要停"], ans: 1, exp: "皇帝企鵝在暴風雪中會成群結隊緊緊擠在一起，並不斷輪替內外圈的位置來共同禦寒。" },
                    { id: 338, q: "螃蟹在海中移動的主要方式是什麼？", options: ["往前跳躍", "橫向(側邊)爬行", "上下翻滾", "用尾巴游泳"], ans: 1, exp: "因為螃蟹腿部關節構造的限制，牠們絕大多數只能快速地橫向移動。" },
                    { id: 339, q: "有些蛾的翅膀上長著像貓頭鷹眼睛一樣的大圓斑（眼斑），這有什麼作用？", options: ["用來看路", "張開翅膀時用來嚇退鳥類等掠食者", "用來吸收水分", "裝飾用"], ans: 1, exp: "巨大的眼斑會讓掠食的鳥類誤以為遇到體型更大的天敵，進而受到驚嚇逃走。" },
                    { id: 340, q: "啄木鳥有著堅硬的鳥喙，牠主要是為了做什麼？", options: ["啄開樹幹捕捉躲在裡面的蟲子", "在石頭上刻字", "跟同伴打架", "敲碎大石頭"], ans: 0, exp: "啄木鳥的喙像鑿子一樣，配合特殊的頭骨避震構造，能在樹幹上敲洞覓食。" },
                    { id: 341, q: "蝸牛在太乾燥或太冷的時候，會分泌黏液把殼口封住並躲在裡面睡覺，這稱為什麼？", options: ["冬眠或夏眠", "裝死", "擬態", "蛻皮"], ans: 0, exp: "藉由休眠並封閉外殼，蝸牛可以減少水分散失，度過環境不好的時期。" },
                    { id: 342, q: "鴨子的腳上有蹼，雞的腳上沒有蹼，這代表什麼意思？", options: ["鴨子比較重", "鴨子比較適應在水中活動", "雞比較聰明", "沒有特別意思"], ans: 1, exp: "身體構造的不同反映了牠們適應不同生活環境的演化結果。" },
                    { id: 343, q: "下列哪一種動物「沒有」牙齒，是把食物整個吞下去後在胃裡磨碎的？", options: ["獅子", "雞(鳥類)", "鯊魚", "人類"], ans: 1, exp: "鳥類沒有牙齒，牠們會吞下小石子在『砂囊(肌胃)』裡幫助磨碎食物。" },
                    { id: 344, q: "海龜有一對像船槳一樣的前肢，這最主要是為了適應什麼環境？", options: ["在沙灘上爬行", "在廣大的海洋中長時間游泳", "在樹上築巢", "在泥土裡挖洞"], ans: 1, exp: "海龜的鰭狀肢非常發達，讓牠們成為名副其實的海洋游泳健將。" },
                    { id: 345, q: "為什麼深海裡的某些魚類（如鮟鱇魚）頭上會有發光的構造？", options: ["為了照明看書", "在黑暗的深海中吸引獵物游過來", "為了讓身體變熱", "為了警告別人"], ans: 1, exp: "深海沒有陽光，發光器就像小燈籠，可以誘騙有趨光性的小魚小蝦靠近而被吃掉。" },
                    { id: 346, q: "黑熊和北極熊是親戚，但黑熊住在森林，北極熊住在雪地，為什麼牠們毛色不同？", options: ["因為牠們愛漂亮", "都是為了融入各自的環境中(保護色)", "北極熊漂白過", "因為吃的食物染色"], ans: 1, exp: "黑熊的深色在森林陰影中不易被發現，北極熊的白色則能融入冰雪世界。" },
                    { id: 347, q: "蜘蛛主要使用什麼方法來捕捉獵物？", options: ["用毒牙追著跑", "吐絲結網，等待昆蟲飛入被黏住", "發出超音波", "在水裡下毒"], ans: 1, exp: "許多蜘蛛會在昆蟲常經過的地方結出具黏性的蜘蛛網，被動地等待獵物上門。" },
                    { id: 348, q: "負鼠在遇到無法逃跑的危險時，最經典的求生招式是什麼？", options: ["放出毒氣", "身體僵硬、張開嘴巴流口水「裝死」", "把身體脹大兩倍", "鑽進硬殼裡"], ans: 1, exp: "負鼠裝死時還會散發出腐臭味，讓喜歡吃新鮮肉類的掠食者誤以為牠腐敗了而放棄。" },
                    { id: 349, q: "無尾熊的雙手有兩根大拇指，這種特殊的構造最方便牠們做什麼？", options: ["剝堅果", "牢牢地抓緊尤加利樹的樹枝", "在水裡游泳", "跟同伴握手"], ans: 1, exp: "對握的指頭設計能產生強大的抓握力，幫助樹棲動物在樹上安全活動不掉落。" },
                    { id: 350, q: "下列哪一句話最能說明動物身體構造與生存的關係？", options: ["每一種構造都是動物愛美設計的", "構造不同是因為動物的環境和生存需求不同", "所有動物的構造最後都會長得一樣", "動物的構造跟生存完全無關"], ans: 1, exp: "『物競天擇，適者生存』，動物的特化構造都是為了適應嚴苛大自然的演化結果。" }                    
                ]
            },

            // ==================== 第四單元 ====================
            "unit4": {
                "unitTitle": "單元4　天氣變變變",
                "sections": [
                    {
                        "chapterTitle": "【4-1】 天氣對生活有何影響",
                        "infographicHTML": `
                            <div class="infographic">
                                <h4 style="margin:0; color:#2c3e50;">💡 學習圖解：天氣與我們的生活</h4>
                                <div class="info-grid">
                                    <div class="info-card" style="border-bottom-color: #f1c40f;"><span class="emoji">☀️</span><span class="part">晴天</span><br><span class="eg">曬衣服、戶外運動</span></div>
                                    <div class="info-card" style="border-bottom-color: #3498db;"><span class="emoji">🌧️</span><span class="part">雨天</span><br><span class="eg">穿雨具、室內活動</span></div>
                                    <div class="info-card" style="border-bottom-color: #e74c3c;"><span class="emoji">🌀</span><span class="part">颱風天</span><br><span class="eg">防颱準備、待在家裡</span></div>
                                </div>
                            </div>
                        `,
                        "lessonHTML": `
                            <h3>🌤️ 每天都在變換表情的天空</h3>
                            <p>天氣就像天空的表情，每天都不一樣，而且深深影響著我們每天要穿什麼、做什麼：</p>
                            <ul>
                                <li><span class="keyword">晴天</span>：出大太陽，氣溫較高。最適合洗曬衣物和棉被，去戶外玩要記得擦防曬。</li>
                                <li><span class="keyword">陰雨天</span>：雲很多、會下雨，氣溫通常會降低。出門需要帶雨具，馬路會變滑要注意安全。</li>
                                <li><span class="keyword">颱風與極端天氣</span>：會帶來強風和豪雨。這時候我們必須做好「防颱準備」，把陽台盆栽收好，並且乖乖待在室內最安全。</li>
                            </ul>
                        `,
                        "applicationText": `
                            <h3>🤔 腦力激盪：小小思辨家</h3>
                            <div class="think-box">
                                <strong>情境：下雨過後特別涼快？</strong><br>
                                炎熱的夏天下午，如果突然下了一場大雷雨，雨停之後，通常會覺得空氣變得涼涼的，沒有那麼熱了。<br><br>
                                <strong>👉 想一想：</strong>為什麼下雨可以幫炎熱的地球「降溫」呢？這跟我們學過的「水的三態變化」有什麼關係？
                            </div>
                            <div class="hover-reveal">
                                <div class="answer-text">
                                    💡 解答：因為落到地面的雨水，會吸收周圍的「熱量」蒸發變成水蒸氣。熱量被水吸走了，空氣中的溫度就會下降，我們就會覺得涼快了！
                                </div>
                            </div>
                        `
                    },
                    {
                        "chapterTitle": "【4-2】 如何觀測天氣",
                        "infographicHTML": `
                            <br>
                            <div class="infographic">
                                <h4 style="margin:0; color:#2c3e50;">💡 學習圖解：氣象觀測小工具</h4>
                                <div class="timeline">
                                    <div class="timeline-step" style="border-color:#e74c3c; min-width: 120px;"><span class="emoji">🌡️</span><span class="part">測量氣溫</span><br><span style="font-size:0.8em">氣溫計 (平視紅色液柱)</span></div>
                                    <div class="timeline-step" style="border-color:#3498db; min-width: 120px;"><span class="emoji">📏</span><span class="part">測量雨量</span><br><span style="font-size:0.8em">雨量器 (平底直筒杯)</span></div>
                                    <div class="timeline-step" style="border-color:#2ecc71; min-width: 120px;"><span class="emoji">☁️</span><span class="part">觀測雲量</span><br><span style="font-size:0.8em">用眼睛看雲占天空的比例</span></div>
                                </div>
                            </div>
                        `,
                        "lessonHTML": `
                            <h3>🔍 化身小小氣象觀測員</h3>
                            <p>氣象學家是用精密的儀器來測量天氣，我們也可以用簡單的工具來觀測喔：</p>
                            <ul>
                                <li><span class="keyword">觀測氣溫（氣溫計）</span>：要把氣溫計放在「通風且不會被陽光直射」的陰涼處。讀取溫度時，眼睛要和紅色液柱的頂端「平視」，單位是攝氏（°C）。</li>

                            <h3>📺 出門前必看：掌握天氣預報</h3>
                            <p>現在我們可以透過電視、網路或手機，提早知道明天甚至一週後的天氣，這可以幫我們做好萬全準備：</p>

                                <li><span class="keyword">看降雨機率帶傘</span>：降雨機率越高，代表下雨的機會越大。如果預報是 70% 或 80%，出門一定要把雨傘放進包包裡。</li>

                "questions": [
                    { id: 401, q: "下列哪一種天氣狀況，最適合把家裡的厚棉被拿出來曬？", options: ["陰天", "晴天", "下雨天", "颱風天"], ans: 1, exp: "晴天有強烈的陽光和高溫，可以讓棉被快速乾燥。" },
                    { id: 402, q: "讀取氣溫計的溫度時，眼睛應該怎麼看才準確？", options: ["從上往下看", "從下往上看", "和紅色液柱頂端平視", "閉眼看"], ans: 2, exp: "平視才能準確對齊刻度。" },
                    { id: 403, q: "測量雨量時，應該選擇什麼形狀的容器最適合？", options: ["平底直筒杯", "上寬下窄的碗", "下寬上窄的瓶子", "隨便杯子"], ans: 0, exp: "平底直筒的杯子能真實反映降雨量。" },
                    { id: 404, q: "應該把雨量器放在哪裡比較好？", options: ["大樹底下", "屋簷底下", "空曠沒有遮蔽物的地方", "客廳桌上"], ans: 2, exp: "放在空曠處才能收集到真實從天空落下的雨水。" },
                    { id: 405, q: "氣象預報顯示「降雨機率 90%」，代表什麼意思？", options: ["下 90 分鐘的雨", "有九成機會會下雨", "90% 地方會下雨", "雨量 90 毫米"], ans: 1, exp: "降雨機率是指下雨的機會大小。" },
                    { id: 406, q: "如果天空被雲完全遮住了，幾乎看不到藍天，這天氣稱為什麼？", options: ["晴天", "多雲", "陰天", "颱風"], ans: 2, exp: "雲量占據天空絕大部分，稱為陰天。" },
                    { id: 407, q: "測量氣溫時，氣溫計應該放在哪裡最準確？", options: ["太陽直射處", "通風且有遮蔽的陰涼處", "冰箱裡", "冷氣出風口"], ans: 1, exp: "太陽直射會讓氣溫計吸熱變熱，導致測出來溫度太高。" },
                    { id: 408, q: "天氣預報氣溫「20°C ~ 25°C」，其中的 20°C 是指什麼？", options: ["平均氣溫", "最高氣溫", "最低氣溫", "晚上氣溫"], ans: 2, exp: "前面的較小數字代表預測的最低氣溫。" },
                    { id: 409, q: "台灣測量氣溫的單位通常是使用哪一種？", options: ["毫米 (mm)", "公斤 (kg)", "攝氏度 (°C)", "公分 (cm)"], ans: 2, exp: "台灣氣溫使用攝氏度 (°C)。" },
                    { id: 410, q: "連續好幾個月都不下雨，會造成什麼嚴重的問題？", options: ["水災", "寒害", "旱災(缺水)", "地震"], ans: 2, exp: "長期不下雨會引發旱災，影響生活和農業用水。" }
                    { id: 411, q: "小明發現天空中的雲變得非常黑、非常厚（烏雲密布），這通常代表什麼天氣即將到來？", options: ["大晴天", "即將下大雨", "會出大太陽", "會起大霧"], ans: 1, exp: "雲層越厚、顏色越深，代表雲裡含有的水滴越多，下雨的機率就非常高。" },
                    { id: 412, q: "如果氣象報告說明天會有「寒流」來襲，我們出門時應該怎麼準備？", options: ["穿短袖短褲", "帶好防曬乳", "穿上厚外套並注意保暖", "帶游泳圈"], ans: 2, exp: "寒流會帶來氣溫急劇下降，必須做好禦寒準備以免生病。" },
                    { id: 413, q: "看見路邊大樹的葉子被吹得劇烈搖晃，甚至連小樹枝都被吹斷了，這表示現在的天氣狀況如何？", options: ["風力很強", "氣溫很高", "空氣很乾燥", "正在下雪"], ans: 0, exp: "我們可以透過觀察周遭物體（如樹葉、旗幟）搖晃的程度來判斷風力的大小。" },
                    { id: 414, q: "如果想要知道今天下了多少雨，讀取雨量器時，單位應該要看哪一個？", options: ["公分 (cm)", "毫米 (mm)", "毫升 (mL)", "公克 (g)"], ans: 1, exp: "氣象上國際通用的降雨量單位是毫米 (mm)，代表平地上累積的水位高度。" },
                    { id: 415, q: "氣象預報中的「紫外線指數」很高時，出門在戶外應該注意什麼？", options: ["一定要帶雨傘防雨", "多穿幾件外套保暖", "塗抹防曬乳、戴帽子防曬", "準備手電筒"], ans: 2, exp: "強烈的紫外線會曬傷皮膚，指數過高時必須做好防曬措施。" },
                    { id: 416, q: "農夫在播種前，為什麼會非常關心最近幾天的天氣預報？", options: ["因為農夫喜歡看電視", "如果有大雨可能會沖毀剛播下的種子", "為了決定要不要去逛街", "天氣和種田完全無關"], ans: 1, exp: "農業「看天吃飯」，播種遇到大雨或寒害都會導致作物死亡，預知天氣能提早防範。" },
                    { id: 417, q: "如果氣象局發布了「海上颱風警報」，漁夫們應該怎麼做最安全？", options: ["趕快出海捕魚", "在海邊觀浪", "將漁船開回港口避風並綁緊", "在船上烤肉"], ans: 2, exp: "颱風帶來的狂風巨浪對船隻極度危險，必須盡速進港避難。" },
                    { id: 418, q: "夏天常常在下午時突然下起又急又大的雨，並伴隨打雷閃電，這稱為什麼？", options: ["梅雨", "颱風雨", "午後雷陣雨(西北雨)", "綿綿細雨"], ans: 2, exp: "夏天受熱對流旺盛，午後常會發展出雷雨胞，帶來短暫但劇烈的陣雨。" },
                    { id: 419, q: "在操場上升旗時，國旗飄向了「東邊」，這代表現在吹的是什麼風？", options: ["東風", "西風", "南風", "北風"], ans: 1, exp: "風向是指『風吹來』的方向。風從西邊吹來把旗子吹向東邊，所以是吹西風。" },
                    { id: 420, q: "天氣預報說氣溫是「15°C ~ 18°C，降雨機率 10%」，你明天出門去公園玩會怎麼穿著打扮？", options: ["穿吊衣短褲、帶大雨傘", "穿薄外套、不用帶傘", "穿厚外套保暖、不一定要帶傘", "穿雨衣雨鞋"], ans: 2, exp: "15~18度偏冷需要外套；降雨機率 10% 代表下雨機會極低，可以不用帶厚重雨具。" },
                    { id: 421, q: "如果一連好幾個星期都「陰雨綿綿」，衣服都曬不乾，家裡可能會出現什麼狀況？", options: ["會發生旱災", "東西容易發霉", "室內會變得非常乾燥", "水庫會沒水"], ans: 1, exp: "長時間下雨會導致空氣濕度過高，物品和牆壁就非常容易滋生黴菌。" },
                    { id: 422, q: "觀測天氣時，為了得到比較準確的紀錄，我們應該怎麼做？", options: ["每天在『同一時間』和『同一地點』觀測", "想到再觀測就好", "每天換不同的地方觀測", "都在有冷氣的室內觀測"], ans: 0, exp: "固定時間與地點能控制變因，比較出來的天氣變化（如氣溫差異）才會準確。" },
                    { id: 423, q: "下列哪一個現象，代表天氣可能要「轉壞(下雨)」了？", options: ["天空萬里無雲", "滿天都是白白澎澎的棉花雲", "天空布滿了灰黑色的厚雲", "看見彩虹"], ans: 2, exp: "灰黑色的厚雲（積雨雲）通常含有大量水氣，是降雨的前兆。" },
                    { id: 424, q: "測量氣溫時，如果手一直緊緊握著氣溫計底部的紅色液囊，會發生什麼事？", options: ["溫度會降到零度", "測出來的溫度會因為體溫而偏高", "氣溫計會爆炸", "測量結果不受影響"], ans: 1, exp: "手溫大約 36 度，握住液囊會讓裡面的液體受熱膨脹，測到的就不是真實氣溫了。" },
                    { id: 425, q: "在台灣，每年五、六月期間常會連續下好幾天的毛毛雨，這段時期稱為什麼？", options: ["颱風季", "寒流", "梅雨季", "乾旱季"], ans: 2, exp: "梅雨季是台灣春夏交替時特有的氣候現象，雖然潮濕，卻是重要的水資源來源。" },
                    { id: 426, q: "如果在操場放風箏，風箏一直飛不起來掉在地上，最可能是因為什麼天氣狀況？", options: ["太陽太大", "下起大雨", "風力太微弱(無風)", "空氣太冷"], ans: 2, exp: "風箏需要足夠的風力產生空氣阻力與升力才能飛上天空。" },
                    { id: 427, q: "使用自製的簡易雨量器量雨時，為什麼一定要放在「平坦」的地面上？", options: ["為了好看", "怕被狗叼走", "避免傾斜導致雨水刻度測量不準確", "比較容易被太陽曬到"], ans: 2, exp: "如果容器傾斜，水面就會呈現斜角，用尺量出來的高度就不會是真實的降雨量。" },
                    { id: 428, q: "看天氣預報地圖時，看見一個「太陽被雲遮住一半」的圖案 ⛅，這代表什麼天氣？", options: ["晴天", "多雲", "陰天", "雷陣雨"], ans: 1, exp: "這是「多雲」的標準符號，代表天空有雲，但太陽偶爾還是會露臉。" },
                    { id: 429, q: "台灣的夏天如果好幾個月都沒有颱風來，雖然沒有風災，但也可能會引發什麼危機？", options: ["發生寒害", "引發旱災(缺水危機)", "每天都會下冰雹", "地震變多"], ans: 1, exp: "颱風雖然危險，但它帶來的豐沛雨水是台灣水庫夏天進水最主要的來源。" },
                    { id: 430, q: "要辨別目前的「風向」，除了看國旗飄動的方向，還可以使用什麼簡易工具？", options: ["溫度計", "雨量杯", "風向袋或泡泡水", "放大鏡"], ans: 2, exp: "風向袋被吹拂的尾端，或是吹出的泡泡飛走的方向，都可以用來反推風吹來的風向。" },
                    { id: 431, q: "強烈颱風過境時，路上的行道樹被連根拔起，這是因為颱風具有什麼破壞力？", options: ["極低的溫度", "極強的風力", "大量的雨水", "極高的紫外線"], ans: 1, exp: "颱風中心附近的狂風具有極大的動能，足以摧毀招牌和樹木。" },
                    { id: 432, q: "氣象局發布了「濃霧特報」，這時候開車在高速公路上最需要注意什麼？", options: ["打開窗戶吹風", "加速通過濃霧區", "減速慢行並開啟車燈，因為視線會非常差", "戴墨鏡開車"], ans: 2, exp: "濃霧是由微小水滴組成的，會嚴重遮蔽視線，必須減速並開燈提醒其他車輛。" },
                    { id: 433, q: "如果在冬天高山上（如合歡山）氣溫降到 0°C 以下，且水氣充足，可能會出現什麼天氣現象？", options: ["下大雷雨", "出大太陽", "下雪", "起沙塵暴"], ans: 2, exp: "當溫度低於冰點且水氣足夠時，雲層中的水滴就會結成冰晶，降落下來成為雪花。" },
                    { id: 434, q: "天氣熱的時候，我們身體會「流汗」，流汗對人體有什麼重要的功用？", options: ["為了把衣服弄濕", "汗水蒸發時會帶走體表熱量，幫助身體降溫", "把身體裡的油排出來", "為了吸引蚊子"], ans: 1, exp: "如同水的三態變化，液態汗水變成氣態水蒸氣時需要吸收熱量，藉此達到散熱效果。" },
                    { id: 435, q: "當你聽到轟隆隆的「雷聲」時，通常代表伴隨著什麼天氣現象即將發生？", options: ["即將出大太陽", "閃電與雷陣雨", "即將下雪", "會有龍捲風"], ans: 1, exp: "打雷是雲層放電（閃電）後急速加熱空氣產生震波的聲音，通常與劇烈的對流雨有關。" },
                    { id: 436, q: "氣溫計上通常有兩個英文字母 C 和 F，台灣一般看哪一個標示來讀取氣溫？", options: ["F (華氏)", "C (攝氏)", "都可以看", "把兩個加起來"], ans: 1, exp: "台灣氣象報告通用的溫度單位是攝氏度 (°C)。" },
                    { id: 437, q: "「空氣品質指標」也是天氣預報的一種，當指標亮紅燈（不良）時，我們應該怎麼做？", options: ["去操場跑步", "盡量待在室內或戴上口罩防霾害", "打開家裡所有窗戶", "多深呼吸"], ans: 1, exp: "空氣品質不良代表懸浮微粒(PM2.5)很多，吸入對肺部有害，應減少戶外劇烈活動。" },
                    { id: 438, q: "我們說今天的天氣很「悶熱」，「悶」通常是因為空氣中的什麼因素造成的？", options: ["溫度太高", "濕度太高(水氣很多)，汗水不容易蒸發", "風太大", "太陽太大"], ans: 1, exp: "濕度過高時，身上的汗水無法順利蒸發散熱，人就會感覺黏膩且悶熱不舒服。" },
                    { id: 439, q: "如果想自己製作一個測量風力的簡易工具，下列哪一種材料最適合？", options: ["沉重的鐵片", "硬梆梆的木板", "輕薄的紙條或彩帶", "裝滿水的寶特瓶"], ans: 2, exp: "因為風力有時候很微弱，必須使用輕薄、容易被風吹動的材質才能觀察出微風的變化。" },
                    { id: 440, q: "看見天氣圖上畫了一把「打開的雨傘」符號 ☔，這是提醒我們今天天氣如何？", options: ["紫外線很強要遮陽", "風很大", "有下雨的機率，出門要帶雨具", "適合去海邊玩水"], ans: 2, exp: "雨傘符號在氣象預報中最直接的意思就是代表該地區有降雨的可能。" },
                    { id: 441, q: "水在自然界中不斷循環，從地面蒸發到天空，再降雨回到地面。這其中最重要的能量來源是誰？", options: ["月亮", "星星", "太陽", "人類"], ans: 2, exp: "太陽的熱能讓地表的水分蒸發升空，是驅動地球水循環與天氣變化的最大引擎。" },
                    { id: 442, q: "下列哪一種職業的工作內容，受天氣變化的影響「最小」？", options: ["出海捕魚的漁夫", "種植水稻的農夫", "室內辦公室的電腦工程師", "戶外建築工人"], ans: 2, exp: "在室內工作且不受自然環境直接影響的職業，對天氣變化的依賴度較低。" },
                    { id: 443, q: "如果我們把雨量器放在一棟五層樓高的建築物旁邊，測出來的雨量可能會發生什麼誤差？", options: ["測出來的雨量會加倍", "建築物可能會擋住風雨，導致測量出來的雨量偏少", "水會變得比較熱", "完全不會有誤差"], ans: 1, exp: "高大建築物會產生遮蔽效應(雨影)，導致落在雨量器裡的水無法代表該區真實降雨量。" },
                    { id: 444, q: "天氣逐漸變熱的「春天」，許多冬眠的動物會發生什麼事？", options: ["繼續睡覺不理會", "醒來開始外出活動和覓食", "躲進水裡", "毛色全部變白"], ans: 1, exp: "春天氣溫回暖、食物變多，這就是喚醒冬眠動物（如蛇、青蛙、熊）起床的自然信號。" },
                    { id: 445, q: "氣象圖上的「雲圖」是從哪裡拍攝回來的畫面？", options: ["氣球上", "飛機上", "外太空的人造衛星", "高樓大廈屋頂"], ans: 2, exp: "氣象衛星在太空中環繞地球，能拍下大範圍雲層的分布與移動，幫助預測颱風。" },
                    { id: 446, q: "秋天早晨出門時覺得有點冷，中午卻出大太陽覺得很熱，這代表什麼天氣特徵？", options: ["日夜溫差很大", "即將下暴雨", "天氣非常穩定", "風力極強"], ans: 0, exp: "早晚冷、中午熱，表示一天之內的最高溫與最低溫相差很多，稱為溫差大，穿衣要特別注意。" },
                    { id: 447, q: "如果把氣溫計放在陽光直射的柏油路面上，測出來的溫度會跟實際的「氣溫」有什麼不同？", options: ["會偏低很多", "會準確無誤", "會偏高很多", "會變成負數"], ans: 2, exp: "柏油路非常容易吸熱，氣溫計放在那裡測到的是地表高溫，而不是空氣真實的溫度。" },
                    { id: 448, q: "颱風來臨前，天空有時會出現非常美麗的橘紅色晚霞，但隔天卻狂風暴雨。這告訴我們什麼道理？", options: ["美麗的天空代表好天氣", "天氣變化有時是難以預測且劇烈的，需隨時留意預報", "晚霞會把颱風嚇跑", "颱風喜歡看晚霞"], ans: 1, exp: "颱風外圍環流有時會造成特殊的折射現象(如火燒雲)，但也預告了劇烈天氣即將到來。" },
                    { id: 449, q: "下過大雨後，如果太陽出來了，我們有時候可以在天空中看見什麼美麗的光學現象？", options: ["極光", "海市蜃樓", "彩虹", "流星雨"], ans: 2, exp: "雨後空氣中充滿微小水滴，當陽光照射這些水滴產生折射與反射時，就會形成彩虹。" },
                    { id: 450, q: "長期紀錄天氣的變化，對我們人類有什麼最大的好處？", options: ["可以拿來賣錢", "能找出氣候規律，幫助防災、農業和生活規劃", "可以改變天氣", "為了參加考試"], ans: 1, exp: "長期的氣象觀測能幫助人類掌握季節變化的規律，提早應對可能的天然災害。" }                    
                ]
            }
        }
    };

    let currentQuestions = [];
    let currentGrade = "grade3_term2";
    let currentUnit = "unit1"; 
    let userMistakes = [];
    let currentQuizSetIndex = 0;
    const QUESTIONS_PER_SET = 10;

    function loadCourse() {
        currentGrade = document.getElementById('grade-select').value;
        currentUnit = document.getElementById('unit-select').value;
        const unitData = knowledgeBase[currentGrade][currentUnit];
        if(!unitData) return;

        document.getElementById('course-title').innerText = unitData.unitTitle;

        const chaptersContainer = document.getElementById('chapters-container');
        chaptersContainer.innerHTML = ""; 
        
        if (unitData.sections && unitData.sections.length > 0) {
            unitData.sections.forEach((sec, index) => {
                let appTextForSpeech = sec.applicationText.replace(/<div class="hover-reveal">[\s\S]*?<\/div>/g, '');
                const rawText = (sec.chapterTitle + "。" + sec.lessonHTML + appTextForSpeech).replace(/<[^>]+>/g, ' ');
                window.speakData[`lesson_${index}`] = rawText;

                chaptersContainer.innerHTML += `
                    <div class="chapter-box">
                        <div class="chapter-title">
                            <span>📌 ${sec.chapterTitle}</span>
                            <button class="btn-speak" onclick="toggleSpeak('lesson_${index}', this)">🔊 唸課文給我聽</button>
                        </div>
                        ${sec.infographicHTML || ''}
                        <div class="lesson-content">${sec.lessonHTML}</div>
                        <div class="life-app">${sec.applicationText}</div>
                    </div>
                `;
            });
        }

        userMistakes = JSON.parse(localStorage.getItem(`scienceMistakes_${currentGrade}_${currentUnit}`)) || [];
        currentQuestions = [...(unitData.questions || [])];
        currentQuizSetIndex = 0; 
        renderQuiz();
        renderMistakes();
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';
        document.getElementById('score-display').innerText = '';

        const startIndex = currentQuizSetIndex * QUESTIONS_PER_SET;
        const endIndex = startIndex + QUESTIONS_PER_SET;
        const questionsToShow = currentQuestions.slice(startIndex, endIndex);

        const totalSets = Math.ceil(currentQuestions.length / QUESTIONS_PER_SET) || 1;
        document.getElementById('quiz-progress').innerText = `目前進度：第 ${currentQuizSetIndex + 1} 組 / 共 ${totalSets} 組`;

        if(questionsToShow.length === 0) {
            container.innerHTML = "<p>本單元考題尚在建置中...</p>";
            return;
        }

        questionsToShow.forEach((q, i) => {
            const globalIndex = startIndex + i; 
            
            let optionsHtml = q.options.map((opt, optIndex) => `
                <label>
                    <input type="radio" name="q${globalIndex}" value="${optIndex}">
                    <strong>${optIndex + 1}.</strong> ${opt}
                </label>
            `).join('');

            window.speakData[`q_${globalIndex}`] = `第${i + 1}題：${q.q}。1：${q.options[0]}。2：${q.options[1]}。3：${q.options[2]}。4：${q.options[3]}`;

            container.innerHTML += `
                <div class="question-card" id="card-${globalIndex}">
                    <div class="question-title">
                        <div><span class="q-number">Q${i + 1}:</span> ${q.q}</div>
                        <button class="btn-speak" onclick="toggleSpeak('q_${globalIndex}', this)">🔊 唸題目</button>
                    </div>
                    <div class="options-grid">${optionsHtml}</div>
                    <div class="feedback" id="feedback-${globalIndex}"></div>
                </div>
            `;
        });
    }

    function submitQuiz() {
        const startIndex = currentQuizSetIndex * QUESTIONS_PER_SET;
        const endIndex = startIndex + QUESTIONS_PER_SET;
        const questionsToShow = currentQuestions.slice(startIndex, endIndex);
        if (questionsToShow.length === 0) return;

        let correctCount = 0;
        let newMistakes = [];

        questionsToShow.forEach((q, i) => {
            const globalIndex = startIndex + i;
            const selected = document.querySelector(`input[name="q${globalIndex}"]:checked`);
            const feedbackEl = document.getElementById(`feedback-${globalIndex}`);
            
            if (!selected) {
                feedbackEl.innerHTML = "⚠️ 請選擇一個答案喔！";
                feedbackEl.className = "feedback show text-danger";
                return;
            }

            const isCorrect = parseInt(selected.value) === q.ans;
            if (isCorrect) {
                correctCount++;
                feedbackEl.innerHTML = `✅ 答對了！<div class='explanation'>${q.exp}</div>`;
                feedbackEl.className = "feedback show text-success";
            } else {
                feedbackEl.innerHTML = `❌ 答錯了。正確答案是：${q.ans + 1}。
                                        <div class='explanation'>💡 說明：${q.exp}</div>`;
                feedbackEl.className = "feedback show text-danger";
                if (!userMistakes.some(m => m.id === q.id)) newMistakes.push(q);
            }
        });

        const score = Math.round((correctCount / questionsToShow.length) * 100);
        document.getElementById('score-display').innerText = `🎯 測驗結果：答對 ${correctCount} / ${questionsToShow.length} 題，得分：${score} 分`;

        if (newMistakes.length > 0) {
            userMistakes = [...userMistakes, ...newMistakes];
            localStorage.setItem(`scienceMistakes_${currentGrade}_${currentUnit}`, JSON.stringify(userMistakes));
            renderMistakes();
        }
        document.getElementById('score-display').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function nextQuizSet() {
        const totalSets = Math.ceil(currentQuestions.length / QUESTIONS_PER_SET);
        if(totalSets <= 1) { alert("本單元目前只有一組題目喔！你可以去程式碼擴充更多題目。"); return; }
        
        if(confirm("確定要切換到下一組題目嗎？這會清除您目前的作答畫面喔！")) {
            currentQuizSetIndex = (currentQuizSetIndex + 1) % totalSets; 
            renderQuiz();
            document.querySelector('.quiz-header-bar').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    function renderMistakes() {
        const container = document.getElementById('mistake-list');
        if (userMistakes.length === 0) {
            container.innerHTML = "<p style='color:#27ae60; font-weight:bold;'>太棒了！目前沒有錯題紀錄喔！</p>";
            return;
        }

        container.innerHTML = userMistakes.map((q, index) => {
            window.speakData[`mistake_${index}`] = `題目：${q.q}。正確答案是：${q.ans + 1}。說明：${q.exp}`;
            return `
            <div class="mistake-item">
                <div style="font-weight:bold; display:flex; justify-content:space-between; flex-wrap: wrap; gap: 10px;">
                    <span style="color:#2c3e50;"><span class="q-number">Q:</span> ${q.q}</span>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn-speak" style="padding: 2px 8px;" onclick="toggleSpeak('mistake_${index}', this)">🔊 唸這題</button>
                        <button class="btn-success" onclick="removeMistake(${q.id})">✅ 我已經學會了</button>
                    </div>
                </div>
                <div style="color:var(--danger); margin-top:10px; font-weight:bold;">👉 正確答案：${q.ans + 1}. ${q.options[q.ans]}</div>
                <div class="explanation">💡 說明：${q.exp}</div>
            </div>
            `;
        }).join('');
    }

    function removeMistake(questionId) {
        userMistakes = userMistakes.filter(q => q.id !== questionId);
        localStorage.setItem(`scienceMistakes_${currentGrade}_${currentUnit}`, JSON.stringify(userMistakes));
        renderMistakes();
    }

    function clearMistakes() {
        if(confirm("確定要清空當前單元所有的錯題紀錄嗎？清空後就無法復原囉！")) {
            userMistakes = [];
            localStorage.removeItem(`scienceMistakes_${currentGrade}_${currentUnit}`);
            renderMistakes();
        }
    }

    window.onload = loadCourse;
</script>

</body>
</html>
